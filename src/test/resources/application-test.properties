# Test profile configuration
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false

bibliocore.loan.default-limit=3
bibliocore.loan.period-days=14
bibliocore.loan.fine-per-day=0.20
bibliocore.loan.overdue-scan-cron=0 0 0 31 2 ?

bibliocore.security.jwt.secret=this-is-a-very-long-secret-key-for-bibliocore-test-env-32-chars
bibliocore.security.jwt.issuer=biblioCore-api-test
bibliocore.security.jwt.access-token-ttl=60

logging.level.com.iliaspiotopoulos.bibliocore=WARN
logging.level.org.springframework.security=WARN