# ====================================================================
# Base configuration (profile-agnostic).
# Profile-specific datasource/logging live in:
#   - application-local-h2.properties  (default, zero-config H2)
#   - application-docker-pg.properties (PostgreSQL in Docker)
# ====================================================================
spring.application.name=biblioCore-api

# Default profile so `mvn spring-boot:run` works out of the box.
spring.profiles.active=local-h2

server.port=8080
# Don't leak internals on errors; ProblemDetail bodies carry the detail.
server.error.include-message=never
server.error.include-stacktrace=never

# --------------------------------------------------------------------
# JPA / Hibernate
# Using JPA auto-generation for development simplicity.
# NOTE: In production, Flyway migrations would be preferred for
# versioned, repeatable, and auditable schema management.
# --------------------------------------------------------------------
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --------------------------------------------------------------------
# Flyway (disabled - using JPA auto-generation)
# In production, enable Flyway for proper schema version control.
# --------------------------------------------------------------------
spring.flyway.enabled=false

# --------------------------------------------------------------------
# OpenAPI / Swagger UI
# --------------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# --------------------------------------------------------------------
# Actuator: expose health (with probes) and info only.
# --------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized

# --------------------------------------------------------------------
# Jackson (Jackson 3 under Boot 4). Writing dates as ISO-8601 strings
# rather than numeric timestamps is the default, so no explicit
# serialization feature is needed here.
# --------------------------------------------------------------------
spring.jackson.default-property-inclusion=non_null

# --------------------------------------------------------------------
# Application business rules (bound via @ConfigurationProperties).
# Centralised here instead of hard-coded magic numbers.
# Prefix kept lowercase ("bibliocore") to match Spring's canonical
# relaxed-binding form for @ConfigurationProperties.
# --------------------------------------------------------------------
bibliocore.loan.default-limit=3
bibliocore.loan.period-days=14
# Monetary value handled as BigDecimal in code; expressed in EUR/day.
bibliocore.loan.fine-per-day=0.20
bibliocore.loan.overdue-scan-cron=0 0 1 * * *

# --------------------------------------------------------------------
# Security / JWT (token issuing + validation seam).
# Secret MUST be overridden per environment; see profile files.
# --------------------------------------------------------------------
bibliocore.security.jwt.issuer=biblioCore-api
bibliocore.security.jwt.access-token-ttl=60

# --------------------------------------------------------------------
# Logging
# Target the real base package (com.iliaspiotopoulos.bibliocore).
# --------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.iliaspiotopoulos.bibliocore=INFO