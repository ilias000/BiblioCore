# ====================================================================
# Profile: local-h2  (DEFAULT)
# Zero-dependency in-memory setup. Clone -> `mvn spring-boot:run`.
#
# H2 runs in PostgreSQL compatibility mode so the same Flyway
# migrations execute against both H2 and the real PostgreSQL profile.
# Keep migration SQL ANSI/portable to avoid dialect drift.
# ====================================================================
spring.datasource.url=jdbc:h2:mem:biblioCoreDB;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console at http://localhost:8080/h2-console
# (JDBC URL above; user sa, no password)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Auto-generate schema from entities (recreate on each restart)
spring.jpa.hibernate.ddl-auto=create-drop

# SQL logging disabled for cleaner console output.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# DEV-ONLY secret. Never use this value outside local development.
# Must be long enough for HMAC-SHA256 (>= 32 bytes).
bibliocore.security.jwt.secret=local-dev-only-change-me-0123456789abcdef0123456789abcdef

logging.level.com.iliaspiotopoulos.bibliocore=DEBUG
logging.level.org.springframework.security=INFO