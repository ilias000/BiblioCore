# ====================================================================
# Profile: docker-pg
# Production-style config backing PostgreSQL inside the Docker network.
# All sensitive/environment values come from env vars (set by
# docker-compose) with safe local defaults for convenience.
# ====================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/biblioCoreDB}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:biblioCore}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:biblioCore}

# HikariCP pool sizing for a containerised app.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}

# Auto-generate/update schema from entities
spring.jpa.hibernate.ddl-auto=update

# No SQL echo in this profile.
spring.jpa.show-sql=false

# Secret is REQUIRED here (no default): fail fast if unset.
bibliocore.security.jwt.secret=${APP_SECURITY_JWT_SECRET}

logging.level.com.iliaspiotopoulos.bibliocore=INFO
logging.level.org.springframework.security=WARN